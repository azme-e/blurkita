<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOTO ADHE BLUR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #fafafa; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; }
        
        .judul { font-size: 24px; font-weight: 800; color: #333; margin-bottom: 10px; z-index: 10; }
        
        /* Indikator status biar tahu AI jalan atau gak */
        #status { font-size: 12px; color: #666; margin-bottom: 10px; }

        #containerUtama {
            position: relative;
            width: 90%; max-width: 400px; aspect-ratio: 3/4;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid #fff; z-index: 10;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.5s ease; }
        .blur-active { filter: blur(20px); }
        #emojiCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
    </style>
</head>
<body>

    <div class="judul">FOTO ADHE BLUR</div>
    <div id="status">Loading AI... Mohon tunggu</div>

    <div id="containerUtama">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="emojiCanvas"></canvas>
    </div>

    <audio id="laguSal" loop><source src="foto_kita_blur.mp3" type="audio/mpeg"></audio>

<script type="module">
    import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('emojiCanvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('laguSal');
    let emojis = [];

    // Setup Canvas
    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Inisialisasi AI
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            const gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task" },
                runningMode: "VIDEO"
            });
            
            status.innerText = "✅ AI Siap! Klik layar untuk mulai.";
            startCamera(gestureRecognizer);
        } catch (e) {
            status.innerText = "❌ Error: " + e.message;
        }
    }

    async function startCamera(recognizer) {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        
        document.body.addEventListener('click', () => { if(audio.paused) audio.play(); }, { once: true });
        
        // Loop Prediksi
        function predict() {
            const now = Date.now();
            const results = recognizer.recognizeForVideo(video, now);
            
            let isVictory = false;
            if (results.gestures.length > 0) {
                // Kadang nama kategori bisa bervariasi, kita cek semua
                results.gestures.forEach(gesture => {
                    if (gesture[0].categoryName === "Victory") isVictory = true;
                });
            }

            if (isVictory) {
                video.classList.add("blur-active");
                if(Math.random() < 0.2) spawnEmoji(); // Spawn emoji saat blur
            } else {
                video.classList.remove("blur-active");
            }
            requestAnimationFrame(predict);
        }
        predict();
    }

    // Animasi Emoji
    function spawnEmoji() {
        emojis.push({ x: Math.random() * canvas.width, y: canvas.height + 50, size: 30, speed: Math.random() * 2 + 2, char: ['❤️', '✨', '🥰'][Math.floor(Math.random() * 3)] });
    }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        emojis.forEach((e, i) => { e.y -= e.speed; ctx.font = `${e.size}px Arial`; ctx.fillText(e.char, e.x, e.y); if(e.y < -50) emojis.splice(i, 1); });
        requestAnimationFrame(animate);
    }
    animate();

    initAI();
</script>
</body>
</html>
