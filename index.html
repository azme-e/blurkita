<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="icon.png">
    <title>FOTO KITA BLUR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        /* Mengunci halaman agar 100% tidak bisa di-scroll */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Hiasan Latar Belakang (Estetik Pastel) */
        .hiasan {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1; /* Posisi di paling belakang */
        }
        .hiasan-1 {
            width: 350px; height: 350px;
            background-color: #ffd1dc; /* Pink pastel */
            top: -100px; left: -100px;
        }
        .hiasan-2 {
            width: 300px; height: 300px;
            background-color: #e0f7fa; /* Biru muda pastel */
            bottom: -50px; right: -80px;
        }

        /* Judul Paling Atas */
        .judul {
            font-size: 26px;
            font-weight: 800;
            color: #333;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* Container Kamera Dibuat Lebih Besar */
        #kameraContainer {
            width: 85%;
            max-width: 450px;
            aspect-ratio: 3 / 4; /* Proporsi Portrait HP */
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 5px solid #ffffff;
            background: #e0e0e0;
            z-index: 10;
            position: relative; /* Diperlukan untuk elemen absolut di dalamnya */
        }

        #webcam { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Agar video full tidak gepeng */
            transform: scaleX(-1); /* Efek cermin */
            transition: filter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }

        /* Efek Blur */
        .blur-active { filter: blur(25px); }

        /* Teks Instruksi */
        .instruksi {
            margin-top: 25px;
            font-size: 13px;
            color: #555;
            text-align: center;
            font-weight: 600;
            z-index: 10;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* Animasi Emoji */
        .emoji {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            pointer-events: none;
            animation: floatEmoji 1.5s ease-out forwards;
        }

        @keyframes floatEmoji {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px);
            }
        }
    </style>
</head>
<body>

    <div class="hiasan hiasan-1"></div>
    <div class="hiasan hiasan-2"></div>

    <div class="judul">FOTO KITA BLUR</div>

    <div id="kameraContainer">
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <div class="instruksi">
        ✌️ Acungkan 2 Jari untuk Blur<br>Turunkan untuk Jernih
    </div>

    <audio id="laguSal" loop>
        <source src="foto_kita_blur.mp3" type="audio/mpeg">
    </audio>

<script type="module">
    import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    let gestureRecognizer;
    const video = document.getElementById('webcam');
    const audio = document.getElementById('laguSal');
    const cameraContainer = document.getElementById('kameraContainer');

    async function setupApp() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task" },
            runningMode: "VIDEO"
        });

        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        
        // Memulai lagu
        document.body.addEventListener('click', () => {
            if(audio.paused) audio.play();
        }, { once: true });
        
        video.addEventListener("loadeddata", predictWebcam);
    }

    async function predictWebcam() {
        const results = gestureRecognizer.recognizeForVideo(video, Date.now());
        
        // Perbaikan BUG Logika di Sini
        let adaVictory = false;

        // Cek apakah kamera mendeteksi tangan dan melihat gestur Victory
        if (results.gestures.length > 0) {
            const gestureName = results.gestures[0][0].categoryName;
            if (gestureName === "Victory") {
                adaVictory = true; // Terdeteksi 2 jari
            }
        }

        // Kalau ada Victory, aktifkan blur dan emoji berterbangan.
        if (adaVictory) {
            video.classList.add("blur-active");
            createEmoji();
        } else {
            video.classList.remove("blur-active");
        }

        window.requestAnimationFrame(predictWebcam);
    }

    // Fungsi untuk membuat emoji
    function createEmoji() {
        const emojis = ['❤️', '😂', '😍', '😊', '🎉']; // Daftar emoji yang bisa muncul
        const emojiElement = document.createElement('div');
        emojiElement.classList.add('emoji');
        emojiElement.textContent = emojis[Math.floor(Math.random() * emojis.length)];

        // Tentukan posisi emoji secara acak di sekitar bingkai kamera
        const top = Math.random() * cameraContainer.offsetHeight;
        const left = Math.random() * cameraContainer.offsetWidth;
        emojiElement.style.top = top + 'px';
        emojiElement.style.left = left + 'px';

        cameraContainer.appendChild(emojiElement);

        // Hapus emoji setelah animasi selesai
        setTimeout(() => {
            emojiElement.remove();
        }, 1500);
    }

    setupApp();
</script>
</body>
</html>
